<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор арифметичних ребусів</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-wrapper">
    <div class="instruction-panel">
        <p>Оберіть рівень складності завдання (легкий, середній чи важкий), а потім натисніть кнопку "Створити". Замініть зірочки цифрами так, щоб приклад на множення став правильним.</p>
    </div>

    <div class="control-panel">
        <div class="difficulty-group">
            <span class="label">Складність:</span>
            <label class="radio-label">
                <input type="radio" name="difficulty" value="easy" checked>
                <span class="radio-text">Легк.</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="difficulty" value="medium">
                <span class="radio-text">Сер.</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="difficulty" value="hard">
                <span class="radio-text">Важк.</span>
            </label>
        </div>

        <button id="generate-btn" class="primary-btn">Створити</button>
    </div>

    <div class="rebus-display-area">
        <div id="rebus-container" class="rebus-container">
            <img src="image.jpg" class="start-placeholder-image">
        </div>
    </div>

    <div class="action-panel">
        <button id="reset-btn" class="secondary-btn icon-btn" title="Скинути ребус">
            <span class="material-icons">refresh</span>
        </button>
        <button id="hint-btn" class="secondary-btn">Підказка</button>
        <button id="check-btn" class="primary-btn">Перевірити</button>
    </div>
</div>

<script src="math-core.js" defer></script>
<script src="app.js" defer></script>

</body>
</html>
